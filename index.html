<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Digital Business Card Generator</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="container">

        <!-- ================= LEFT PANEL ================= -->

        <div class="form-section">

            <h1>Digital Business Card</h1>

            <input type="text" id="name" placeholder="Full Name">

            <input type="text" id="designation" placeholder="Designation">

            <input type="text" id="company" placeholder="Company">

            <input type="email" id="email" placeholder="Email">

            <input type="text" id="phone" placeholder="Phone Number">

            <input type="text" id="website" placeholder="Website">

            <h3>Social Links</h3>

            <input type="text" id="linkedin" placeholder="LinkedIn URL">

            <input type="text" id="github" placeholder="GitHub URL">

            <input type="text" id="instagram" placeholder="Instagram URL">

            <h3>Profile Image</h3>

            <input type="file" id="imageUpload" accept="image/*">

            <h3>Choose Template</h3>

            <select id="template">

                <option value="modern">Modern</option>

                <option value="dark">Dark</option>

                <option value="minimal">Minimal</option>

                <option value="corporate">Corporate</option>

            </select>

            <div class="buttons">

                <button onclick="downloadImage()">
                    Download PNG
                </button>

                <button onclick="downloadPDF()">
                    Download PDF
                </button>

            </div>

        </div>

        <!-- ================= RIGHT PANEL ================= -->

        <div class="preview-section">

            <div id="businessCard" class="modern">

                <img id="previewImage"
                    src="https://via.placeholder.com/120"
                    alt="Profile">

                <h2 id="previewName">
                    Your Name
                </h2>

                <p id="previewDesignation">
                    Designation
                </p>

                <p id="previewCompany">
                    Company
                </p>

                <hr>

                <p id="previewEmail">
                    example@email.com
                </p>

                <p id="previewPhone">
                    +91 9876543210
                </p>

                <p id="previewWebsite">
                    www.website.com
                </p>

                <div class="icons">

                    <a id="linkedinIcon" href="#" target="_blank">
                        <i class="fab fa-linkedin"></i>
                    </a>

                    <a id="githubIcon" href="#" target="_blank">
                        <i class="fab fa-github"></i>
                    </a>

                    <a id="instagramIcon" href="#" target="_blank">
                        <i class="fab fa-instagram"></i>
                    </a>

                </div>

            </div>

        </div>

    </div>

    <!-- html2canvas -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- jsPDF -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
